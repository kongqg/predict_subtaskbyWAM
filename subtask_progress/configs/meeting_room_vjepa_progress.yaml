seed: 42
device: cuda
output_dir: /datashare/kqg/meeting_room_progress_outputs/vjepa_progress_20k

model:
  visual_dim:
  proprio_dim: 0
  num_tasks: 13
  history_length: 32
  d_model: 256
  num_layers: 3
  num_heads: 8
  dim_feedforward: 1024
  dropout: 0.1
  activation: gelu

dataset:
  train_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/train
  val_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/val
  feature_root:
    train: /datashare/kqg/meeting_room_progress_outputs/vjepa_features/train
    val: /datashare/kqg/meeting_room_progress_outputs/vjepa_features/val
  visual_column: visual_features
  proprio_column:
  task_column: task_index
  done_column:
  done_label_strategy: last_window
  done_window: 3
  segment_end_mode: exclusive
  frame_stride: 2
  max_samples:
  max_cached_episodes: 8
  seed: 42
  augment:
    random_sample_interval: false
    max_sample_interval: 1
    random_skip_prob: 0.0
    random_repeat_prob: 0.0
    random_pause_prob: 0.0
    random_history_crop: false
    min_history_length: 8

loss:
  lambda_progress: 1.0
  lambda_done: 1.0
  lambda_rank: 0.1
  target_margin: 0.05
  ranking_margin: 0.02
  done_pos_weight:
  max_pairs_per_segment: 2048

training:
  batch_size: 256
  eval_batch_size: 512
  num_workers: 4
  max_steps: 20000
  learning_rate: 0.0001
  weight_decay: 0.00001
  amp: true
  grad_clip: 1.0
  log_every: 50
  eval_every: 1000
  checkpoint_every: 5000

evaluation:
  done_threshold: 0.5
  num_curve_plots: 8

tiny_overfit:
  max_samples: 32
