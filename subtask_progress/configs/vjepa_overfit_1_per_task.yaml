seed: 42
device: cuda
output_dir: /datashare/kqg/meeting_room_progress_outputs/vjepa_overfit_1_per_task

model:
  visual_dim:
  proprio_dim: 0
  num_tasks: 13
  history_length: 32
  d_model: 128
  num_layers: 2
  num_heads: 4
  dim_feedforward: 512
  dropout: 0.0
  activation: gelu

dataset:
  train_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/train
  val_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/train
  feature_root:
    train: /datashare/kqg/meeting_room_progress_outputs/vjepa_features_overfit_1_per_task/train
    val: /datashare/kqg/meeting_room_progress_outputs/vjepa_features_overfit_1_per_task/train
  visual_column: visual_features
  proprio_column:
  task_column: task_index
  done_column:
  done_label_strategy: last_window
  done_window: 3
  segment_end_mode: exclusive
  frame_stride: 4
  max_samples:
  max_cached_episodes: 4
  seed: 42
  augment: {}

loss:
  lambda_progress: 1.0
  lambda_done: 1.0
  lambda_rank: 0.1
  target_margin: 0.05
  ranking_margin: 0.02
  done_pos_weight:
  max_pairs_per_segment: 512

training:
  batch_size: 32
  eval_batch_size: 64
  num_workers: 0
  max_steps: 800
  learning_rate: 0.0003
  weight_decay: 0.00001
  amp: true
  grad_clip: 1.0
  log_every: 50
  eval_every: 200
  checkpoint_every: 400

evaluation:
  done_threshold: 0.5
  num_curve_plots: 13
