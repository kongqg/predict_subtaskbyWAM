seed: 7
device: cuda
output_dir: /datashare/kqg/meeting_room_progress_outputs/tiny_overfit

model:
  visual_dim:
  proprio_dim: 0
  num_tasks: 13
  history_length: 16
  d_model: 64
  num_layers: 2
  num_heads: 4
  dim_feedforward: 128
  dropout: 0.0
  activation: gelu

dataset:
  train_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/train
  val_root: /datashare/kqg/meeting_room_code/meeting_room_404_0511_order_success_with_subtask_segmented_split/val
  visual_column: observation.state
  proprio_column:
  task_column: task_index
  done_column:
  done_label_strategy: last_window
  done_window: 3
  segment_end_mode: exclusive
  frame_stride: 8
  max_samples: 256
  max_cached_episodes: 4
  seed: 7
  augment:
    random_sample_interval: false
    max_sample_interval: 1
    random_skip_prob: 0.0
    random_repeat_prob: 0.0
    random_pause_prob: 0.0
    random_history_crop: false
    min_history_length: 4

loss:
  lambda_progress: 1.0
  lambda_done: 1.0
  lambda_rank: 0.1
  target_margin: 0.05
  ranking_margin: 0.02
  done_pos_weight:
  max_pairs_per_segment: 512

training:
  batch_size: 32
  eval_batch_size: 64
  num_workers: 0
  max_steps: 300
  learning_rate: 0.0005
  weight_decay: 0.0
  amp: true
  grad_clip: 1.0
  log_every: 25
  eval_every: 100
  checkpoint_every: 300

evaluation:
  done_threshold: 0.5
  num_curve_plots: 4

tiny_overfit:
  max_samples: 32
